<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Editor to LaTeX</title>
    <!-- 引入 MathLive 核心套件 -->
    <script defer src="https://unpkg.com/mathlive"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f2f2f7;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 上方編輯區 */
        .editor-section {
            padding: 30px 20px;
            border-bottom: 1px solid #e5e5ea;
        }

        /* MathLive 編輯器元件樣式 */
        math-field {
            font-size: 28px;
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            box-sizing: border-box;
        }

        /* 隱藏 MathLive 右側預設的「三條線/鍵盤」開關按鈕，讓畫面更乾淨 */
        math-field::part(virtual-keyboard-toggle) {
            display: none !important; 
        }

        /* 下方輸出的 LaTeX */
        .output-section {
            padding: 20px;
            background: #fafafa;
        }
        
        .output-section h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            background-color: #fff;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 輸入區 -->
    <div class="editor-section">
        <math-field id="mf">x=\frac{-b\pm\sqrt{b^2-4ac}}{2a}</math-field>
    </div>

    <!-- LaTeX 輸出區 -->
    <div class="output-section">
        <h3>LaTeX 語法輸出：</h3>
        <textarea id="latex-output" readonly></textarea>
    </div>
</div>

<script>
    const mf = document.getElementById('mf');
    const latexOutput = document.getElementById('latex-output');

    // 1. 同步 LaTeX 輸出
    mf.addEventListener('input', () => {
        latexOutput.value = mf.value;
    });
    // 初始載入時顯示預設值
    latexOutput.value = mf.value;

    // 2. 強制行為：無論電腦或手機，只要點擊輸入框，就強制彈出內建的黑色虛擬鍵盤
    mf.addEventListener('focusin', () => {
        // 呼叫 MathLive 的全域物件來顯示鍵盤
        mathVirtualKeyboard.show();
    });
</script>

</body>
</html>
