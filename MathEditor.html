<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 加入 user-scalable=no 徹底防止手機誤判雙擊放大 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學編輯器</title>
    
    <script defer src="https://unpkg.com/mathlive"></script>

    <style>
        body { 
            margin: 0; padding: 20px; background-color: #f2f2f7; font-family: sans-serif; 
            /* 最佳化 1：消除整個網頁的點擊延遲 */
            touch-action: manipulation; 
        }

        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .top-bar { display: flex; justify-content: flex-end; }
        .copy-btn { 
            background-color: #007aff; color: white; border: none; border-radius: 8px; 
            padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 3px 8px rgba(0,122,255,0.3); 
            /* 最佳化 2：防止按鈕上的文字被意外反白選取 */
            user-select: none; 
        }
        .copy-btn:active { transform: scale(0.95); }

        .editor-wrapper { 
            background: #ffffff; border: 2px solid #007aff; border-radius: 12px; 
            padding: 15px; min-height: 150px; 
            /* 最佳化 3：確保點擊區塊不會產生預設的藍色高光閃爍 */
            -webkit-tap-highlight-color: transparent;
        }

        math-field { 
            font-size: 26px; width: 100%; border: none; outline: none; background: transparent; 
        }
        math-field::part(menu-toggle), math-field::part(virtual-keyboard-toggle) { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="copy-btn" onclick="copyLatex()">📋 複製全部 LaTeX</button>
        </div>
        <div class="editor-wrapper">
            <math-field id="mf"></math-field>
        </div>
    </div>

    <script>
        customElements.whenDefined('math-field').then(() => {
            const mf = document.getElementById('mf');
            /*
            const advancedLayout = {
                label: "進階", tooltip: "矩陣與微積分",
                rows: [
                    [
                        { class: "keycap", label: "[■] 2x2", latex: "\\begin{bmatrix}#?&#?\\\\#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 2x2", latex: "\\begin{pmatrix}#?&#?\\\\#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "{ 聯立", latex: "\\begin{cases}#?\\\\#?\\end{cases}" },
                        { class: "keycap", label: "∫ 定積分", latex: "\\int_{#?}^{#?} #? \\, dx" }
                    ],
                    [
                        { class: "keycap", label: "[■] 3x3", latex: "\\begin{bmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 3x3", latex: "\\begin{pmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "lim 極限", latex: "\\lim_{#? \\to #?} #?" },
                        { class: "keycap", label: "d/dx 微分", latex: "\\frac{d}{dx}\\left( #? \\right)" }
                    ]
                ]
            };

            window.mathVirtualKeyboard.layouts = [
                ...window.mathVirtualKeyboard.layouts, 
                advancedLayout
            ];
            */
            mf.value = "x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}";
            
            // 【最佳化 4】只保留最單純的喚醒機制，不干擾 MathLive 內部邏輯
            mf.addEventListener('focusin', () => {
                window.mathVirtualKeyboard.show();
            });
            // (已經移除了 click wrapper 就強制 focus 的干擾程式碼)
        });

        function copyLatex() {
            const fullLatex = document.getElementById('mf').value; 
            if (!fullLatex) return alert("畫布是空的！");
            navigator.clipboard.writeText(fullLatex)
                .then(() => alert("✅ 已成功複製 LaTeX：\n\n" + fullLatex))
                .catch(() => alert("❌ 複製失敗"));
        }
    </script>
</body>
</html>
