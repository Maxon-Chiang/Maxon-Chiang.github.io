<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學編輯器</title>
    
    <script defer src="https://unpkg.com/mathlive"></script>

    <style>
        body { 
            margin: 0; padding: 20px; background-color: #f2f2f7; font-family: sans-serif; 
            touch-action: manipulation; 
        }

        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
        .top-bar { display: flex; justify-content: flex-end; }
        .copy-btn { 
            background-color: #007aff; color: white; border: none; border-radius: 8px; 
            padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; 
            box-shadow: 0 3px 8px rgba(0,122,255,0.3); 
            user-select: none; 
        }
        .copy-btn:active { transform: scale(0.95); }

        .editor-wrapper { 
            background: #ffffff; border: 2px solid #007aff; border-radius: 12px; 
            padding: 15px; min-height: 150px; 
            -webkit-tap-highlight-color: transparent;
        }

        math-field { 
            font-size: 26px; width: 100%; border: none; outline: none; background: transparent; 
        }
        math-field::part(menu-toggle), math-field::part(virtual-keyboard-toggle) { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="copy-btn" onclick="copyLatex()">📋 複製全部 LaTeX</button>
        </div>
        <div class="editor-wrapper">
            <math-field id="mf"></math-field>
        </div>
    </div>

    <script>
        customElements.whenDefined('math-field').then(() => {
            const mf = document.getElementById('mf');
            mf.value = "x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}";
            
            // 【擴充需求】：自訂一個「矩陣與進階數學」的鍵盤面板
            const advancedLayout = {
                label: '進階/矩陣',
                tooltip: '矩陣、聯立方程式與進階符號',
                rows: [
                    // 第一排：2x2 矩陣、2個聯立、向量等
                    [
                        { latex: '\\begin{pmatrix} \\cdot & \\cdot \\\\ \\cdot & \\cdot \\end{pmatrix}', insert: '\\begin{pmatrix} #? & #? \\\\ #? & #? \\end{pmatrix}' },
                        { latex: '\\begin{bmatrix} \\cdot & \\cdot \\\\ \\cdot & \\cdot \\end{bmatrix}', insert: '\\begin{bmatrix} #? & #? \\\\ #? & #? \\end{bmatrix}' },
                        { latex: '\\begin{cases} \\cdot \\\\ \\cdot \\end{cases}', insert: '\\begin{cases} #? \\\\ #? \\end{cases}' },
                        { latex: '\\vec{v}', insert: '\\vec{#?}' },
                        { latex: '\\overline{AB}', insert: '\\overline{#?}' },
                        { latex: '\\int', insert: '\\int_{#?}^{#?}' },
                        { latex: '\\sum', insert: '\\sum_{#?}^{#?}' }
                    ],
                    // 第二排：3x3 矩陣、3個聯立、極限等
                    [
                        { latex: '\\begin{pmatrix} \\cdot & \\cdot & \\cdot \\\\ \\cdot & \\cdot & \\cdot \\\\ \\cdot & \\cdot & \\cdot \\end{pmatrix}', insert: '\\begin{pmatrix} #? & #? & #? \\\\ #? & #? & #? \\\\ #? & #? & #? \\end{pmatrix}' },
                        { latex: '\\begin{bmatrix} \\cdot & \\cdot & \\cdot \\\\ \\cdot & \\cdot & \\cdot \\\\ \\cdot & \\cdot & \\cdot \\end{bmatrix}', insert: '\\begin{bmatrix} #? & #? & #? \\\\ #? & #? & #? \\\\ #? & #? & #? \\end{bmatrix}' },
                        { latex: '\\begin{cases} \\cdot \\\\ \\cdot \\\\ \\cdot \\end{cases}', insert: '\\begin{cases} #? \\\\ #? \\\\ #? \\end{cases}' },
                        { latex: '\\widehat{A}', insert: '\\widehat{#?}' },
                        { latex: '\\binom{n}{k}', insert: '\\binom{#?}{#?}' },
                        { latex: '\\lim', insert: '\\lim_{#? \\to #?}' },
                        { latex: '\\prod', insert: '\\prod_{#?}^{#?}' }
                    ],
                    // 第三排：幾何與邏輯符號
                    [
                        { latex: '\\triangle', insert: '\\triangle' },
                        { latex: '\\angle', insert: '\\angle' },
                        { latex: '\\because', insert: '\\because' },
                        { latex: '\\therefore', insert: '\\therefore' },
                        { latex: '\\approx', insert: '\\approx' },
                        { latex: '\\sim', insert: '\\sim' },
                        { latex: '\\cong', insert: '\\cong' }
                    ],
                    // 第四排：系統預設的方向鍵與刪除鍵
                    [
                        "[left]", "[right]", "[up]", "[down]", "[backspace]", "[return]"
                    ]
                ]
            };

            // 設定鍵盤的 Tab (保留原本的 4 個，加上我們自訂的 1 個)
            window.mathVirtualKeyboard.layouts = [
                'numeric',      // 123
                'symbols',      // 符號
                'alphabetic',   // abc
                'greek',        // 希臘字母
                advancedLayout  // 自訂的矩陣與進階鍵盤
            ];

            // 【問題修復】：改變喚醒機制
            // 使用 pointerdown 代替 focusin，並判斷鍵盤是否已經顯示，徹底解決按鍵沒反應的問題
            mf.addEventListener('pointerdown', () => {
                if (!window.mathVirtualKeyboard.visible) {
                    window.mathVirtualKeyboard.show();
                }
            });

        });

        function copyLatex() {
            const fullLatex = document.getElementById('mf').value; 
            if (!fullLatex) return alert("畫布是空的！");
            navigator.clipboard.writeText(fullLatex)
                .then(() => alert("✅ 已成功複製 LaTeX：\n\n" + fullLatex))
                .catch(() => alert("❌ 複製失敗"));
        }
    </script>
</body>
</html>
