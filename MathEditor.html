<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕數學編輯器 (極簡安全版)</title>
    <script defer src="https://unpkg.com/mathlive"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #f2f2f7; font-family: sans-serif; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100dvh; padding: 15px; box-sizing: border-box; gap: 10px; }
        .top-bar { display: flex; justify-content: flex-end; align-items: center; }
        .copy-btn { background-color: #007aff; color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 3px 8px rgba(0,122,255,0.3); }
        .copy-btn:active { background-color: #0056b3; transform: scale(0.95); }
        .editor-wrapper { flex: 1; background: #ffffff; border: 2px solid #007aff; border-radius: 12px; padding: 15px; position: relative; display: flex; }
        math-field { font-size: 26px; width: 100%; border: none; outline: none; background: transparent; }
        math-field::part(menu-toggle), math-field::part(virtual-keyboard-toggle) { display: none !important; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <button class="copy-btn" onclick="copyLatex()">📋 複製全部 LaTeX</button>
        </div>
        <div class="editor-wrapper">
            <math-field id="mf"></math-field>
        </div>
    </div>

    <script>
        customElements.whenDefined('math-field').then(() => {
            const mf = document.getElementById('mf');
            
            // 【極簡擴充】只放矩陣、聯立、微積分的核心框架，按鈕用最簡單的安全文字
            const advancedLayout = {
                label: "進階", 
                tooltip: "矩陣與微積分",
                rows: [
                    [
                        { class: "keycap", label: "[■] 2x2", latex: "\\begin{bmatrix}#?&#?\\\\#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 2x2", latex: "\\begin{pmatrix}#?&#?\\\\#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "{ 聯立", latex: "\\begin{cases}#?\\\\#?\\end{cases}" },
                        { class: "keycap", label: "∫ 定積分", latex: "\\int_{#?}^{#?} #? \\, dx" }
                    ],
                    [
                        { class: "keycap", label: "[■] 3x3", latex: "\\begin{bmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 3x3", latex: "\\begin{pmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "lim 極限", latex: "\\lim_{#? \\to #?} #?" },
                        { class: "keycap", label: "d/dx 微分", latex: "\\frac{d}{dx}\\left( #? \\right)" }
                    ]
                ]
            };

            window.mathVirtualKeyboard.layouts = [
                ...window.mathVirtualKeyboard.layouts, 
                advancedLayout
            ];

            mf.value = "x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}";
            setTimeout(() => { mf.focus(); mf.executeCommand('moveToMathFieldEnd'); window.mathVirtualKeyboard.show(); }, 300);
            document.querySelector('.editor-wrapper').addEventListener('click', () => { mf.focus(); window.mathVirtualKeyboard.show(); });
        });

        function copyLatex() {
            const fullLatex = document.getElementById('mf').value; 
            if (!fullLatex) return alert("畫布是空的！");
            navigator.clipboard.writeText(fullLatex).then(() => alert("✅ 已成功複製：\n\n" + fullLatex)).catch(() => alert("❌ 複製失敗"));
        }
    </script>
</body>
</html>
