<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學編輯器 (穩定版)</title>
    
    <!-- 引入 MathLive -->
    <script defer src="https://unpkg.com/mathlive"></script>

    <style>
        /* 移除鎖死螢幕的設定，讓網頁可以自然滑動 */
        body { 
            margin: 0; 
            padding: 20px; 
            background-color: #f2f2f7; 
            font-family: sans-serif; 
        }

        .container {
            max-width: 800px; /* 限制電腦版最大寬度 */
            margin: 0 auto;   /* 置中 */
            display: flex; 
            flex-direction: column; 
            gap: 15px;
        }

        .top-bar { 
            display: flex; 
            justify-content: flex-end; 
        }

        .copy-btn { 
            background-color: #007aff; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 10px 18px; 
            font-size: 15px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 3px 8px rgba(0,122,255,0.3); 
        }

        .copy-btn:active { transform: scale(0.95); }

        .editor-wrapper { 
            background: #ffffff; 
            border: 2px solid #007aff; 
            border-radius: 12px; 
            padding: 15px; 
            min-height: 150px; /* 給定一個基本高度 */
        }

        math-field { 
            font-size: 26px; 
            width: 100%; 
            border: none; 
            outline: none; 
            background: transparent; 
        }

        /* 隱藏預設的三條線選單 */
        math-field::part(menu-toggle), 
        math-field::part(virtual-keyboard-toggle) { 
            display: none !important; 
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            <button class="copy-btn" onclick="copyLatex()">📋 複製全部 LaTeX</button>
        </div>
        <div class="editor-wrapper">
            <math-field id="mf"></math-field>
        </div>
    </div>

    <script>
        customElements.whenDefined('math-field').then(() => {
            const mf = document.getElementById('mf');
            
            // 【進階鍵盤擴充】保留最實用的矩陣與微積分
            const advancedLayout = {
                label: "進階", 
                tooltip: "矩陣與微積分",
                rows: [
                    [
                        { class: "keycap", label: "[■] 2x2", latex: "\\begin{bmatrix}#?&#?\\\\#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 2x2", latex: "\\begin{pmatrix}#?&#?\\\\#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "{ 聯立", latex: "\\begin{cases}#?\\\\#?\\end{cases}" },
                        { class: "keycap", label: "∫ 定積分", latex: "\\int_{#?}^{#?} #? \\, dx" }
                    ],
                    [
                        { class: "keycap", label: "[■] 3x3", latex: "\\begin{bmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{bmatrix}" },
                        { class: "keycap", label: "(■) 3x3", latex: "\\begin{pmatrix}#?&#?&#?\\\\#?&#?&#?\\\\#?&#?&#?\\end{pmatrix}" },
                        { class: "keycap", label: "lim 極限", latex: "\\lim_{#? \\to #?} #?" },
                        { class: "keycap", label: "d/dx 微分", latex: "\\frac{d}{dx}\\left( #? \\right)" }
                    ]
                ]
            };

            // 附加到系統鍵盤
            window.mathVirtualKeyboard.layouts = [
                ...window.mathVirtualKeyboard.layouts, 
                advancedLayout
            ];

            // 載入預設公式
            mf.value = "x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}";
            
            // 【移除】會引發報錯的 executeCommand
            // 改成讓使用者自己點擊輸入框時，才顯示鍵盤
            mf.addEventListener('focusin', () => {
                window.mathVirtualKeyboard.show();
            });
            
            // 如果點到框框外的空白處，也確保鍵盤會出來
            document.querySelector('.editor-wrapper').addEventListener('click', () => {
                mf.focus();
            });
        });

        function copyLatex() {
            const fullLatex = document.getElementById('mf').value; 
            if (!fullLatex) {
                alert("畫布是空的！");
                return;
            }
            navigator.clipboard.writeText(fullLatex).then(() => {
                alert("✅ 已成功複製 LaTeX：\n\n" + fullLatex);
            }).catch(() => {
                alert("❌ 複製失敗。由於您是從電腦硬碟 (C槽/G槽) 直接打開網頁，瀏覽器安全機制可能會阻擋複製功能。請改用上傳到網站，或手動反白複製。");
            });
        }
    </script>
</body>
</html>
