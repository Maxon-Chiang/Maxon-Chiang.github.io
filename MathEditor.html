<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕數學編輯器</title>
    
    <!-- 引入 MathLive 核心套件 -->
    <script defer src="https://unpkg.com/mathlive"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #f2f2f7; 
            font-family: sans-serif;
            overflow: hidden; 
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100dvh; 
            padding: 15px;
            box-sizing: border-box;
        }

        .editor-wrapper {
            flex: 1;
            background: #ffffff;
            border: 2px solid #007aff; 
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
            display: flex;
            align-items: flex-start;
        }

        math-field {
            font-size: 26px; 
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
        }

        /* 
         * 【關鍵解法 1】 
         * 不去動 JS 的底層設定，單純用 CSS 把「三條線」和「鍵盤圖示」徹底隱藏！
         * 這樣既不會擋住畫面，又不會破壞鍵盤的連線功能。
         */
        math-field::part(menu-toggle),
        math-field::part(virtual-keyboard-toggle) {
            display: none !important; 
        }

        .copy-btn {
            position: absolute;
            bottom: 15px; 
            right: 15px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 16px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 8px rgba(0,122,255,0.3);
            z-index: 100;
        }
        .copy-btn:active {
            background-color: #0056b3;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="editor-wrapper">
            <!-- 恢復預設狀態，讓套件自己管理 -->
            <math-field id="mf"></math-field>
            <button class="copy-btn" onclick="copyLatex()">複製 LaTeX</button>
        </div>
    </div>

    <script>
        customElements.whenDefined('math-field').then(() => {
            const mf = document.getElementById('mf');
            
            // 寫入預設公式
            mf.value = "x=\\frac{-b\\pm\\sqrt{b^2-4ac}}{2a}";
            
            setTimeout(() => {
                // 1. 先讓輸入框取得焦點
                mf.focus();
                
                // 2. 【關鍵解法 2】
                // 把游標強制移動到公式的「最右邊」，避免全選導致按鍵覆蓋清空！
                mf.executeCommand('moveToMathFieldEnd');
                
                // 3. 顯示鍵盤
                window.mathVirtualKeyboard.show();
            }, 300);
            
            // 確保每次點擊空白處，鍵盤都會彈出來
            document.querySelector('.editor-wrapper').addEventListener('click', () => {
                mf.focus();
                window.mathVirtualKeyboard.show();
            });
        });

        // 複製 LaTeX 語法
        function copyLatex() {
            const mf = document.getElementById('mf');
            navigator.clipboard.writeText(mf.value).then(() => {
                alert("✅ 已成功複製 LaTeX 語法：\n\n" + mf.value);
            }).catch(err => {
                alert("❌ 複製失敗，請手動選取複製");
            });
        }
    </script>

</body>
</html>
