<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>教師答案卷</title>
    <style>
        body { font-family: sans-serif; background: #eee; padding: 40px; }
        .box { max-width: 700px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; border-top: 10px solid #2980b9; }
        h1 { color: #2980b9; text-align: center; }
        .ans-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ans-table th, .ans-table td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        .ans-table th { background: #f4f4f4; }
        .red-text { color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>
<div class="box">
    <h1>教師專用答案卷 (總分 80 分)</h1>
    
    <h3>一、 選擇題 (40分)</h3>
    <table class="ans-table">
        <tr><th>1-5</th><td class="red-text">A, B, C, B, A</td></tr>
        <tr><th>6-10</th><td class="red-text">C, B, A, B, C</td></tr>
    </table>

    <h3>二、 填充題 (20分)</h3>
    <table class="ans-table">
        <tr><th>11</th><td>無法推動位置：<span class="red-text">死點</span></td></tr>
        <tr><th>12</th><td>慣性帶過：<span class="red-text">飛輪</span></td></tr>
        <tr><th>13</th><td>雨刷機構：<span class="red-text">曲柄搖桿</span></td></tr>
        <tr><th>14</th><td>平行圓盤：<span class="red-text">正齒輪</span></td></tr>
        <tr><th>15</th><td>設計前置：<span class="red-text">資料蒐集 (或 蒐集資料)</span></td></tr>
    </table>

    <h3>三、 是非題 (20分)</h3>
    <table class="ans-table">
        <tr><th>16-20</th><td class="red-text">O, X, O, O, X</td></tr>
    </table>

    <h3>四、 反思題批改建議</h3>
    <p>此部分（21-25 題）無固定標準答案，建議針對學生的思考邏輯、實作觀察以及對力學原理的理解度，給予彈性評分或加分回饋。</p>
</div>
</body>
</html>
